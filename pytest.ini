[pytest]
# Répertoire des tests Python
testpaths = tests/python

# Mode asyncio par défaut (requis si on utilise @pytest.mark.asyncio)
asyncio_mode = auto

# Verbosité
addopts = -v --tb=short

# Ignore les warnings internes de pydantic-settings et fastapi
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
